name: CD - Python AI Service Deploy

on:
  push:
    branches:
      - main # Solo se activa al fusionar en main

jobs:
  # ─── Build y Push a Docker Hub ────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/relevo-ia-python:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/relevo-ia-python:${{ github.sha }}

  # ─── Deploy en el VPS ─────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conectar a Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-cd-ea

      - name: Actualizar contenedor vía SSH
        run: |
          ssh -o StrictHostKeyChecking=no ea@${{ secrets.SERVER_IP }} << 'EOF'
            cd ~/relevo

            # 1. Descargar la nueva imagen del servicio Python
            docker compose pull relevo-ia-service

            # 2. Reiniciar solo el servicio Python (el resto no se toca)
            docker compose up -d relevo-ia-service

            # 3. Limpiar imágenes antiguas para no petar el disco
            docker image prune -f
          EOF
