name: CI - Python AI Service

on:
  push:
    branches: ['dev']
  pull_request:
    branches: ['dev', 'main']

jobs:
  # ─── Calidad de Código ────────────────────────────────────────
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar que la app importa correctamente
        env:
          GEMINI_API_KEY: dummy_key_for_ci
          API_KEY: dummy_api_key_for_ci
        run: python -c "from app.main import app; print('✅ App importada correctamente')"

  # ─── Build de la imagen Docker ────────────────────────────────
  # Comprueba que el Dockerfile construye sin errores
  docker-build-check:
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: relevo-ia-python:ci-check
